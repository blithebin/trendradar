name: Clean up old GitHub Actions runs

on:
  schedule:
    # 每天UTC时间凌晨3点运行（北京时间上午11点）
    - cron: '0 3 * * *'
  workflow_dispatch:    # 允许你手动触发

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 30 days
        uses: yanovation/delete-old-actions@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          days-ago: 30
          # keep-latest: 5   # 如果你想至少保留最近5条记录，去掉这行的注释
          # dry-run: true    # 第一次请先打开这行，测试无误后再关闭
